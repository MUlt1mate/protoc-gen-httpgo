name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  all:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [ '1.25', '1.26' ]
    env:
      GOPATH: /home/runner/go
      INCLUDEPATH: /usr/local/include
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install protoc
        run: |
          wget -q https://github.com/protocolbuffers/protobuf/releases/download/v31.1/protoc-31.1-linux-x86_64.zip -P .
          unzip ./protoc-31.1-linux-x86_64.zip -d ./protoc
          mv ./protoc/bin/* ${GOPATH}/bin/.
          sudo mv ./protoc/include/google ${INCLUDEPATH}/.
          chmod 755 ${GOPATH}/bin/*
          rm -rf ./protoc

      - name: Install googleapis
        run: |
          export TMP_PATH=${GOPATH}/src/github.com/googleapis
          sudo mkdir ${INCLUDEPATH}/google/api -p
          git clone https://github.com/googleapis/googleapis.git $TMP_PATH
          cd $TMP_PATH
          git checkout d9eae9f029427bd9ed4379d8e3cd46ca69f1a33f
          sudo cp google/api/annotations.proto google/api/field_behavior.proto google/api/http.proto google/api/httpbody.proto \
            ${INCLUDEPATH}/google/api
          rm -rf $TMP_PATH

      - name: Install protoc-gen-go
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.5

      - name: Vendor
        run: go mod vendor

      - name: Build
        run: go build .

      - name: Install plugin
        run: go install .

      - name: Generate example
        run: |
          go generate ./example/proto/generate.go
          sed -i '1d' ./example/proto/*.httpgo.go
          sed -i '1d' ./example/proto/fasthttp/*.httpgo.go
          sed -i '1d' ./example/proto/nethttp/*.httpgo.go
          sed -i '1d' ./example/proto/gin/*.httpgo.go
          sed -i '1d' ./example/proto/fiber/*.httpgo.go

      - name: Test plugin
        run: go test -v ./...

      - name: Test example
        run: (cd ./example/ && go test -v ./...)

      - name: Format
        run: |
          gofmt -s -w .
          git diff --exit-code

      - name: Run example
        run: (cd ./example/ && go run .)

  golangci:
    name: lint
    runs-on: ubuntu-latest
    needs: [all]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: golangci-lint plugin
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
      - name: golangci-lint example
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          working-directory: ./example
